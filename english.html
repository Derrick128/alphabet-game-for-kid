<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英文聽力 - 每日10題</title>
    <link rel="stylesheet" href="styles.css">
    <script src="core.js"></script>
    <script src="data.js"></script>
    <style>
        body {
            background-color: var(--bg-blue);
            padding-top: 10px;
        }

        .container {
            max-width: 950px;
            height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .eng-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #fff;
            border-radius: 15px;
            border: 3px solid #e1f5fe;
            cursor: pointer;
            transition: 0.2s;
        }

        .eng-item.active {
            border-color: var(--primary);
            background: #f1faff;
        }

        .eng-item.graded.correct {
            border-color: var(--accent);
            background: #e8f5e9;
        }

        .eng-item.graded.wrong {
            border-color: var(--danger);
            background: #ffebee;
        }

        .audio-btn {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .ans-slot {
            min-width: 80px;
            height: 35px;
            border: 2px dashed #90caf9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: #fff;
        }

        .options-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
            background: #f8fdff;
            border-radius: 20px;
            border: 3px solid #e1f5fe;
        }

        .opt-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 3px solid #eee;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.1s;
        }

        .opt-card:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="nav-link" onclick="playClick()">🏠 主選單</a>
            <div id="session-progress" style="font-weight: bold;">進度: 0/10</div>
            <div style="color: var(--primary); font-weight: bold;">每日英文聽力</div>
        </div>

        <div class="math-layout">
            <!-- Left: Question List -->
            <div class="question-list" id="question-list">
                <div id="eng-grid" style="display:flex; flex-direction:column; gap:10px;"></div>
                <button id="btn-submit-exam" class="btn btn-accent" style="display:none; margin-top:15px"
                    onclick="submitSession()">📤 做完囉！交卷評分</button>
            </div>

            <!-- Right: Interactive area -->
            <div class="canvas-section">
                <div class="canvas-info" id="current-focus-text">請點擊左側喇叭聽題目</div>
                <div id="interaction-box"
                    style="flex:1; display:flex; flex-direction:column; justify-content:center; gap:20px;">
                    <div id="big-play-btn"
                        style="width:120px; height:120px; background:var(--primary); border-radius:50%; margin:0 auto; display:none; align-items:center; justify-content:center; font-size:4rem; color:white; cursor:pointer;"
                        onclick="playFocused()">🔊</div>
                    <div id="options-panel" class="options-panel" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TOTAL = 10;
        let sessionData = [];
        let currentIndex = -1;
        let isGraded = false;

        async function init() {
            LukeCore.Timer.start();
            await GAME_DATA.loadFromCloud();
            setupSession();
            renderList();
        }

        function setupSession() {
            const list = GAME_DATA.ENGLISH.QA_LIST;
            // Pick 10 random
            const shuffled = [...list].sort(() => Math.random() - 0.5);
            sessionData = shuffled.slice(0, TOTAL).map(item => ({
                q: item.q,
                a: item.a,
                options: [item.a, ...item.wrong].sort(() => Math.random() - 0.5),
                userAns: null,
                result: null
            }));
        }

        function renderList() {
            const grid = document.getElementById('eng-grid');
            grid.innerHTML = '';
            let completedCount = 0;

            sessionData.forEach((item, i) => {
                if (item.userAns) completedCount++;
                const el = document.createElement('div');
                el.className = `eng-item ${currentIndex === i ? 'active' : ''}`;
                if (item.result) el.classList.add('graded', item.result);

                el.innerHTML = `
                    <div class="audio-btn" onclick="event.stopPropagation(); playVoice('${item.q}')">🔊</div>
                    <div class="ans-slot">${item.userAns || ''}</div>
                `;
                el.onclick = () => selectItem(i);
                grid.appendChild(el);
            });

            document.getElementById('session-progress').innerText = `進度: ${completedCount}/10`;
            document.getElementById('btn-submit-exam').style.display = (completedCount === TOTAL && !isGraded) ? 'block' : 'none';
        }

        function selectItem(idx) {
            currentIndex = idx;
            document.getElementById('current-focus-text').innerText = `正在聽第 ${idx + 1} 題`;
            document.getElementById('big-play-btn').style.display = 'flex';

            const panel = document.getElementById('options-panel');
            panel.innerHTML = '';
            panel.style.display = 'grid';

            sessionData[idx].options.forEach(opt => {
                const card = document.createElement('div');
                card.className = 'opt-card';
                card.innerText = opt;
                card.onclick = () => chooseAnswer(opt);
                panel.appendChild(card);
            });

            renderList();
            playFocused();
        }

        function playFocused() {
            if (currentIndex !== -1) playVoice(sessionData[currentIndex].q);
        }

        function playVoice(txt) {
            LukeCore.Audio.speak(txt);
        }

        function chooseAnswer(ans) {
            if (currentIndex === -1) return;
            sessionData[currentIndex].userAns = ans;
            playClick();

            // Feedback
            if (currentIndex < TOTAL - 1) {
                selectItem(currentIndex + 1);
            } else {
                renderList();
            }
        }

        function submitSession() {
            isGraded = true;
            let correctCount = 0;
            sessionData.forEach(item => {
                if (item.userAns === item.a) {
                    item.result = 'correct';
                    correctCount++;
                } else {
                    item.result = 'wrong';
                }
            });

            const duration = LukeCore.Timer.stop();
            LukeCore.Daily.markComplete('english', duration);

            LukeCore.Audio.playSuccess();
            alert(`聽力練習結束！\n答對題數：${correctCount} / 10\n用時：${Math.floor(duration / 60)}分${duration % 60}秒\n獲得星星：${correctCount * 3}`);
            LukeCore.Stats.addStars(correctCount * 3);

            renderList();

            // Correction Logic
            const multiBtn = document.getElementById('btn-submit-exam');
            multiBtn.style.display = 'block';
            multiBtn.innerText = "重新練習錯題";
            multiBtn.className = "btn btn-secondary";
            multiBtn.onclick = () => {
                const firstWrong = sessionData.findIndex(s => s.result === 'wrong');
                if (firstWrong !== -1) {
                    selectItem(firstWrong);
                } else {
                    alert("全部都對囉！太棒了！");
                    location.href = 'index.html';
                }
            };
        }

        init();
    </script>
</body>

</html>
