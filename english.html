<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英文聽力互動</title>
    <link rel="stylesheet" href="styles.css">
    <script src="core.js"></script>
    <script src="data.js"></script>
    <style>
        #question-area {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 0 var(--shadow);
            border: 4px solid var(--bg-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .main-speaker {
            width: 90px;
            height: 90px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 #0288d1;
            transition: transform 0.1s;
        }

        .main-speaker:active {
            transform: scale(0.95);
            box-shadow: 0 2px 0 #0288d1;
        }

        .question-text {
            font-size: 1.4rem;
            color: #0277bd;
            font-weight: bold;
        }

        #options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
        }

        #options-grid.grid-mode {
            grid-template-columns: 1fr 1fr;
        }

        .option-card {
            background: var(--white);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 0 var(--shadow);
            border: 3px solid #e1f5fe;
            transition: transform 0.1s;
            cursor: pointer;
        }

        .option-card:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--shadow);
        }

        .option-speaker {
            width: 45px;
            height: 45px;
            background: #e0f7fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
            flex-shrink: 0;
        }

        .option-content {
            flex-grow: 1;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .correct {
            background-color: #c8e6c9 !important;
            border-color: #4caf50 !important;
        }

        .wrong {
            background-color: #ffcdd2 !important;
            border-color: #ef5350 !important;
        }

        .mode-btn {
            flex: 1;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .debug-panel {
            margin-top: 10px;
            font-size: 0.8rem;
            background: #fffde7;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #fff59d;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="nav-link" onclick="LukeCore.Audio.playClick()">🏠</a>
            <div class="mode-switch" style="display: flex; gap: 10px; flex: 1; margin-left: 15px;">
                <button class="btn btn-gray mode-btn active" id="btn-qa" onclick="switchMode('QA')">🗣️ 對話</button>
                <button class="btn btn-gray mode-btn" id="btn-sort" onclick="switchMode('SORT')">🗂️ 分類</button>
            </div>
        </div>

        <div id="question-area">
            <div class="main-speaker" onclick="playQuestion()">🔊</div>
            <div class="question-text" id="q-text">準備中...</div>
        </div>

        <div id="options-grid"></div>

        <div class="debug-panel">
            <details>
                <summary>🔍 系統狀態</summary>
                <div id="debug-info" style="font-family: monospace; white-space: pre-wrap; margin-top: 5px;"></div>
            </details>
        </div>
    </div>
    <div id="feedback-msg">太棒了!</div>

    <script>
        let currentMode = 'QA';
        let currentItem = { q: "", a: "", theme: "" };

        function updateDebugInfo(msg) {
            const el = document.getElementById('debug-info');
            const timestamp = new Date().toLocaleTimeString();
            el.textContent += `[${timestamp}] ${msg}\n`;
            console.log(msg);
        }

        async function init() {
            updateDebugInfo("🚀 開始初始化...");
            document.getElementById('q-text').innerText = "正在下載題庫...";

            try {
                if (typeof GAME_DATA === 'undefined') {
                    updateDebugInfo("❌ 錯誤：data.js 沒有正確載入");
                    document.getElementById('q-text').innerText = "❌ data.js 載入失敗";
                    return;
                }
                updateDebugInfo("✅ GAME_DATA 已載入");
                await GAME_DATA.loadFromCloud();
                updateDebugInfo(`📊 QA 題數: ${GAME_DATA.ENGLISH.QA_LIST.length}`);
                updateDebugInfo(`📊 Sort 題數: ${GAME_DATA.ENGLISH.SORT_LIST.length}`);
                if (GAME_DATA.ENGLISH.QA_LIST.length === 0 && GAME_DATA.ENGLISH.SORT_LIST.length === 0) {
                    document.getElementById('q-text').innerText = "⚠️ 沒抓到題目";
                    return;
                }
                switchMode('QA');
            } catch (error) {
                updateDebugInfo(`❌ 初始化錯誤: ${error.message}`);
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btn-qa').classList.toggle('active', mode === 'QA');
            document.getElementById('btn-sort').classList.toggle('active', mode === 'SORT');
            if (mode === 'QA') {
                document.getElementById('options-grid').classList.remove('grid-mode');
            } else {
                document.getElementById('options-grid').classList.add('grid-mode');
            }
            loadLevel();
        }

        function loadLevel() {
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            if (currentMode === 'QA') {
                const list = GAME_DATA.ENGLISH.QA_LIST;
                currentItem = list[Math.floor(Math.random() * list.length)];
                document.getElementById('q-text').innerText = currentItem.q;
                let options = [currentItem.a, ...currentItem.wrong].sort(() => Math.random() - 0.5);
                options.forEach(opt => {
                    createCard(opt, (card) => {
                        if (opt === currentItem.a) {
                            card.classList.add('correct');
                            showFeedback("Correct! 答對了!");
                            LukeCore.Audio.speak("Correct! " + opt);
                            LukeCore.Stats.addStars(1);
                            setTimeout(loadLevel, 2000);
                        } else {
                            card.classList.add('wrong', 'shake');
                            LukeCore.Audio.speak("Try again");
                            setTimeout(() => card.classList.remove('wrong', 'shake'), 500);
                        }
                    });
                });
                setTimeout(() => LukeCore.Audio.speak(currentItem.q), 500);
            } else {
                const list = GAME_DATA.ENGLISH.SORT_LIST;
                currentItem = list[Math.floor(Math.random() * list.length)];
                const cleanTheme = currentItem.theme.split(':')[1]?.split('(')[0] || currentItem.theme;
                document.getElementById('q-text').innerText = "找出: " + currentItem.theme;
                let allWords = [...currentItem.targets, ...currentItem.decoys].sort(() => Math.random() - 0.5);
                currentItem.remaining = currentItem.targets.length;
                setTimeout(() => LukeCore.Audio.speak("Find " + cleanTheme), 500);
                allWords.forEach(word => {
                    createCard(word, (card) => {
                        if (card.classList.contains('correct')) return;
                        if (currentItem.targets.includes(word)) {
                            card.classList.add('correct');
                            LukeCore.Audio.speak(word);
                            currentItem.remaining--;
                            if (currentItem.remaining === 0) {
                                showFeedback("Good Job! 全找到了!");
                                LukeCore.Stats.addStars(2);
                                setTimeout(loadLevel, 2000);
                            }
                        } else {
                            card.classList.add('wrong', 'shake');
                            LukeCore.Audio.speak("Oh no");
                            setTimeout(() => card.classList.remove('wrong', 'shake'), 500);
                        }
                    });
                });
            }
        }

        function createCard(text, onClick) {
            const grid = document.getElementById('options-grid');
            const card = document.createElement('div');
            card.className = 'option-card';
            const speaker = document.createElement('div');
            speaker.className = 'option-speaker';
            speaker.innerText = '🔊';
            speaker.onclick = (e) => { e.stopPropagation(); LukeCore.Audio.speak(text); };
            const content = document.createElement('div');
            content.className = 'option-content';
            content.innerText = text;
            card.appendChild(speaker); card.appendChild(content);
            card.onclick = () => onClick(card);
            grid.appendChild(card);
        }

        function playQuestion() {
            if (currentMode === 'QA') LukeCore.Audio.speak(currentItem.q);
            else LukeCore.Audio.speak("Find " + (currentItem.theme.split(':')[1] || currentItem.theme));
        }

        init();
    </script>
</body>

</html>
