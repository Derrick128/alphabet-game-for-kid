<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luke's Learning</title>
    <link rel="stylesheet" href="styles.css">
    <script src="core.js"></script>
    <script src="data.js"></script>
    <style>
        header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        main {
            width: 90%;
            max-width: 600px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            padding-bottom: 80px;
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .eng {
            border-color: var(--bg-blue);
            color: #0277bd;
        }

        .math {
            border-color: var(--bg-orange);
            color: #e65100;
        }

        .write-en {
            border-color: var(--bg-green);
            color: #2e7d32;
        }

        .write-zh {
            border-color: #fce4ec;
            color: #c2185b;
        }

        .btn-round {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            position: fixed;
            z-index: 100;
            font-size: 1.5rem;
        }

        #music-toggle {
            bottom: 20px;
            right: 20px;
        }

        #shop-btn {
            bottom: 20px;
            left: 20px;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-10px) rotate(5deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="status-header">
            <div class="pet-container" id="pet-avatar-container">
                <span id="base-pet">🦖</span>
                <div id="acc-layer"></div>
            </div>
            <div class="star-badge">
                ⭐ <span id="star-count">0</span>
            </div>
        </div>
        <h1>Luke's Learning</h1>
        <p>今天想玩什麼呢？</p>
    </header>

    <main>
        <a href="english.html" class="card eng" onclick="playClick()">
            <div class="card-icon">🔠</div>
            <div class="card-title">英文聽力</div>
            <div class="card-desc">對話・分類遊戲</div>
        </a>

        <a href="math.html" class="card math" onclick="playClick()">
            <div class="card-icon">🧮</div>
            <div class="card-title">數學運算</div>
            <div class="card-desc">加減法・手寫計算</div>
        </a>

        <a href="writing.html?type=EN" class="card write-en" onclick="playClick()">
            <div class="card-icon">✍️</div>
            <div class="card-title">英文練字</div>
            <div class="card-desc">ABC 筆順練習</div>
        </a>

        <a href="writing.html?type=ZH" class="card write-zh" onclick="playClick()">
            <div class="card-icon">ㄅ</div>
            <div class="card-title">注音符號</div>
            <div class="card-desc">ㄅㄆㄇ 手寫練習</div>
        </a>
    </main>

    <button id="shop-btn" class="btn btn-accent btn-round" onclick="toggleShop(true)">🛍️</button>
    <button id="music-toggle" class="btn btn-secondary btn-round" onclick="toggleMusic()">🎵</button>

    <!-- Shop UI -->
    <div id="shop-overlay" class="shop-overlay" onclick="toggleShop(false)"></div>
    <div id="shop-modal" class="shop-modal">
        <h2 style="margin-top:0">星星商店 ⭐</h2>
        <p>收集星星買配件，把小恐龍變帥！</p>
        <div id="shop-grid" class="shop-grid"></div>
        <button class="btn btn-gray" style="width:100%; margin-top:20px;" onclick="toggleShop(false)">關閉</button>
    </div>

    <div id="feedback-msg"></div>

    <script>
        function updateUI() {
            document.getElementById('star-count').innerText = LukeCore.Stats.getStars();
            renderPet();
        }

        function renderPet() {
            const accLayer = document.getElementById('acc-layer');
            accLayer.innerHTML = '';
            const outfit = LukeCore.Stats.getOutfit();

            outfit.forEach(itemId => {
                const item = SHOP_DATA.find(i => i.id === itemId);
                if (item) {
                    const el = document.createElement('div');
                    el.className = `pet-accessory acc-${item.id}`;
                    el.innerText = item.icon;
                    accLayer.appendChild(el);
                }
            });
        }

        function toggleShop(show) {
            document.getElementById('shop-modal').style.display = show ? 'block' : 'none';
            document.getElementById('shop-overlay').style.display = show ? 'block' : 'none';
            if (show) renderShop();
            playClick();
        }

        function renderShop() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = '';
            const inventory = LukeCore.Stats.getInventory();
            const outfit = LukeCore.Stats.getOutfit();

            SHOP_DATA.forEach(item => {
                const isOwned = inventory.includes(item.id);
                const isEquipped = outfit.includes(item.id);

                const card = document.createElement('div');
                card.className = `item-card ${isOwned ? 'owned' : ''} ${isEquipped ? 'equipped' : ''}`;
                card.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${isOwned ? '已擁有' : '⭐ ' + item.price}</div>
                `;

                card.onclick = () => {
                    if (isOwned) {
                        LukeCore.Stats.toggleEquip(item.id);
                        showFeedback(isEquipped ? "收起來了" : "穿上去了！");
                    } else {
                        const res = LukeCore.Stats.buyItem(item.id, item.price);
                        if (res.success) {
                            showFeedback("購買成功！");
                            LukeCore.Audio.playSuccess();
                        } else {
                            showFeedback(res.reason);
                        }
                    }
                    updateUI();
                    renderShop();
                };
                grid.appendChild(card);
            });
        }

        function toggleMusic() {
            const isPlaying = LukeCore.Audio.toggleBGM();
            document.getElementById('music-toggle').innerText = isPlaying ? "⏸️" : "🎵";
            playClick();
        }

        // Initialize
        updateUI();
    </script>
</body>

</html>
