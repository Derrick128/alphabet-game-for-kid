<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學大挑戰 - 50題大關卡</title>
    <link rel="stylesheet" href="styles.css">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script src="core.js"></script>
    <script src="data.js"></script>
    <style>
        body {
            background-color: var(--bg-orange);
            padding-top: 10px;
        }

        .container {
            max-width: 950px;
            height: 95vh;
            display: flex;
            flex-direction: column;
        }

        #canvas-wrapper {
            flex: 1;
            background: #fff;
            border: 5px solid #ffab91;
            border-radius: 20px;
            position: relative;
            cursor: crosshair;
        }

        canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            border-radius: 15px;
        }

        .grading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
    </style>
</head>

<body>

    <!-- Decorative Bubbles -->
    <div class="bubble" style="width: 100px; height: 100px; top: 10%; left: -5%; animation-delay: 0s;"></div>
    <div class="bubble" style="width: 60px; height: 60px; top: 60%; left: 80%; animation-delay: 1s;"></div>

    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="nav-link" style="color:white" onclick="playClick()">🏠 主選單</a>
            <div id="exam-progress" style="font-weight: 900;">已完成: 0/50</div>
            <div style="color: white; font-weight: 900;">數學大挑戰</div>
        </div>

        <div class="math-layout">
            <!-- Left: Question List -->
            <div class="question-list" id="question-list">
                <div class="math-pagination" id="pagination"></div>
                <div id="questions-grid" style="display:flex; flex-direction:column; gap:8px;"></div>
                <button id="btn-submit-exam" class="btn btn-accent" style="display:none;" onclick="submitExam()">📤
                    全部寫完囉！交卷</button>
            </div>

            <!-- Right: Canvas -->
            <div class="canvas-section">
                <div class="canvas-info" id="current-focus-text">請點擊左側題目開始</div>
                <div id="canvas-wrapper">
                    <canvas id="mathCanvas"></canvas>
                </div>
                <div class="btn-group" style="display: flex; gap: 10px;">
                    <button class="btn btn-gray" onclick="clearCanvas()">重寫</button>
                    <button class="btn btn-primary" id="btn-confirm" onclick="confirmAnswer()" disabled>確認填入 ✅</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Grading Modal -->
    <div id="grading-modal" class="grading-overlay">
        <h2>AI 正在努力改考卷中...</h2>
        <div id="grad-progress">0%</div>
        <div class="spinner" style="width:40px; height:40px; border-width:5px;"></div>
    </div>

    <script>
        const TOTAL_QUESTIONS = 50;
        const PAGE_SIZE = 10;
        let allQuestions = [];
        let currentPage = 0;
        let currentIndex = -1;

        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let worker = null;

        // Init 50 questions
        function setupExam() {
            LukeCore.Timer.start(); // Start Timer
            allQuestions = [];
            for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                // Mix difficulty
                let level = 1;
                if (i > 15) level = 2;
                if (i > 35) level = 3;

                const qData = generateQuestion(level);
                allQuestions.push({
                    q: qData.q,
                    a: qData.a,
                    imgData: null,
                    result: null // 'correct', 'wrong', null
                });
            }
            renderPagination();
            renderPage(0);
        }

        function renderPagination() {
            const nav = document.getElementById('pagination');
            nav.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const btn = document.createElement('div');
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.innerText = `P${i + 1}`;
                btn.onclick = () => {
                    currentPage = i;
                    renderPagination();
                    renderPage(i);
                    playClick();
                };
                nav.appendChild(btn);
            }
        }

        function renderPage(pageIdx) {
            const grid = document.getElementById('questions-grid');
            grid.innerHTML = '';
            const start = pageIdx * PAGE_SIZE;
            const end = start + PAGE_SIZE;

            for (let i = start; i < end; i++) {
                const item = allQuestions[i];
                const el = document.createElement('div');
                el.className = `math-item ${currentIndex === i ? 'active' : ''}`;
                if (item.result) el.classList.add('graded', item.result);

                el.innerHTML = `
                    <span style="font-weight:bold">${item.q.replace('?', '')}</span>
                    <div class="slot-box" id="slot-${i}">
                        ${item.imgData ? `<img src="${item.imgData}" class="slot-thumbnail">` : ''}
                    </div>
                `;
                el.onclick = () => selectQuestion(i);
                grid.appendChild(el);
            }

            // Show submit button only if many are filled
            const filledCount = allQuestions.filter(q => q.imgData).length;
            document.getElementById('btn-submit-exam').style.display = filledCount >= 10 ? 'block' : 'none';
            document.getElementById('exam-progress').innerText = `已完成: ${filledCount}/50`;
        }

        function selectQuestion(idx) {
            currentIndex = idx;
            document.getElementById('current-focus-text').innerText = `正在寫題：${allQuestions[idx].q}`;
            document.getElementById('btn-confirm').disabled = false;

            // Clear or Load existing drawing? 
            // User requested "保有修改空間", so we should ideally reload...
            // But canvas is usually temporary. To modify, they draw fresh.
            clearCanvas();

            renderPage(currentPage); // update active class
            playClick();
        }

        function confirmAnswer() {
            if (currentIndex === -1) return;

            // Capture canvas
            const dataURL = getCanvasWithWhiteBackground();
            allQuestions[currentIndex].imgData = dataURL;

            // Feedback
            playClick();
            LukeCore.UI.showFeedback("已填入答案！");

            // Auto advance?
            if (currentIndex < TOTAL_QUESTIONS - 1) {
                // If next is in same page
                if (Math.floor((currentIndex + 1) / PAGE_SIZE) === currentPage) {
                    selectQuestion(currentIndex + 1);
                } else {
                    renderPage(currentPage);
                }
            } else {
                renderPage(currentPage);
            }
        }

        async function submitExam() {
            if (!confirm("確定要交卷評分嗎？")) return;

            document.getElementById('grading-modal').style.display = 'flex';

            if (!worker) {
                worker = await Tesseract.createWorker('eng', 1, {
                    langPath: 'https://tessdata.projectnaptha.com/4.0.0'
                });
                await worker.setParameters({ tessedit_char_whitelist: '0123456789', tessedit_pageseg_mode: '8' });
            }

            let correctCount = 0;
            const filledIndices = allQuestions.map((q, i) => q.imgData ? i : -1).filter(i => i !== -1);

            for (let i = 0; i < filledIndices.length; i++) {
                const idx = filledIndices[i];
                const q = allQuestions[idx];

                document.getElementById('grad-progress').innerText = `${Math.round((i / filledIndices.length) * 100)}%`;

                try {
                    const { data: { text } } = await worker.recognize(q.imgData);
                    const recognized = text.trim().replace(/\D/g, '');
                    if (parseInt(recognized) === q.a) {
                        q.result = 'correct';
                        correctCount++;
                    } else {
                        q.result = 'wrong';
                        console.log(`Q${idx + 1} Wrong: expected ${q.a}, saw ${recognized}`);
                    }
                } catch (e) {
                    q.result = 'wrong';
                }
            }

            // Finish
            document.getElementById('grading-modal').style.display = 'none';
            const duration = LukeCore.Timer.stop();
            LukeCore.Daily.markComplete('math', duration);

            alert(`測驗結束！\n答對題數：${correctCount} / 50\n用時：${Math.floor(duration / 60)}分${duration % 60}秒`);
            // LukeCore.Stats.addStars(correctCount * 2); // REPLACED BY DAILY CHEST
            renderPage(currentPage);

            // Allow correction
            document.getElementById('btn-submit-exam').innerText = "修正錯誤題目";
            document.getElementById('btn-submit-exam').className = "btn btn-secondary";
            document.getElementById('btn-submit-exam').onclick = () => {
                // Find first wrong item and focus it
                const firstWrong = allQuestions.findIndex(q => q.result === 'wrong');
                if (firstWrong !== -1) {
                    currentPage = Math.floor(firstWrong / PAGE_SIZE);
                    renderPagination();
                    selectQuestion(firstWrong);
                } else {
                    alert("全部都對囉！太棒了！");
                    location.href = 'index.html';
                }
            };
        }

        // --- Question Generation (Simplified from original) ---
        function generateQuestion(level) {
            if (level === 1) {
                let a = r(1, 10), b = r(1, 10);
                return { q: `${a} + ${b} = ?`, a: a + b };
            } else if (level === 2) {
                let a = r(10, 30), b = r(5, 15);
                return Math.random() > 0.5 ? { q: `${a} + ${b} = ?`, a: a + b } : { q: `${a} - ${b} = ?`, a: a - b };
            } else {
                let a = r(10, 20), b = r(5, 10), c = r(2, 8);
                return { q: `${a} + ${b} - ${c} = ?`, a: a + b - c };
            }
        }
        function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        // --- Canvas Logic ---
        function getCanvasWithWhiteBackground() {
            const w = canvas.width, h = canvas.height;
            // Add padding (Tesseract likes white space around the character)
            const padding = 20;
            const t = document.createElement('canvas');
            t.width = w + padding * 2;
            t.height = h + padding * 2;
            const c = t.getContext('2d');

            // Fill white
            c.fillStyle = '#ffffff';
            c.fillRect(0, 0, t.width, t.height);

            // Draw original
            c.drawImage(canvas, padding, padding);

            // Image Processing: Thresholding (Make lines black and background pure white)
            const imgData = c.getImageData(0, 0, t.width, t.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const brightness = (data[i] + data[i + 1] + data[i + 2]) / 3;
                const v = brightness > 180 ? 255 : 0; // If light, make white. If dark, make black.
                data[i] = data[i + 1] = data[i + 2] = v;
            }
            c.putImageData(imgData, 0, 0);

            return t.toDataURL('image/png', 0.5);
        }
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            setupCtx();
        }
        function setupCtx() { ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#333'; }
        function setupCanvas() {
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                return { x, y };
            };
            const start = (e) => { e.preventDefault(); isDrawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
            const move = (e) => { if (!isDrawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            const stop = () => isDrawing = false;
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start, { passive: false });
            canvas.addEventListener('touchmove', move, { passive: false });
            canvas.addEventListener('touchend', stop);
        }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        window.onload = () => {
            setupExam();
            resizeCanvas();
            setupCanvas();
            window.onresize = resizeCanvas;
        };
    </script>
</body>

</html>
