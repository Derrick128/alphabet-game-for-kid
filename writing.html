<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>練字小教室</title>

    <link rel="stylesheet" href="styles.css">
    <script src="core.js"></script>
    <script src="data.js"></script>

    <style>
        body {
            background-color: var(--bg-green);
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        #selection-view {
            width: 100%;
            height: calc(100vh - 80px);
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            padding-bottom: 40px;
        }

        .char-card {
            background: white;
            border-radius: 20px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #444;
            box-shadow: 0 4px 0 var(--shadow);
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .char-card:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .grid-en .char-card {
            border-color: #b3e5fc;
            color: #0277bd;
            font-family: 'Arial', sans-serif;
        }

        .grid-zh .char-card {
            border-color: #f8bbd0;
            color: #c2185b;
            font-size: 2rem;
        }

        #practice-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #canvas-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 10px auto;
            border: 6px dashed var(--accent);
            border-radius: 25px;
            background-color: white;
            box-shadow: 0 8px 20px var(--shadow);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 20px;
            touch-action: none;
        }

        #bg-layer {
            z-index: 1;
        }

        #draw-layer {
            z-index: 2;
            cursor: crosshair;
        }

        #result-display {
            margin-top: 5px;
            font-size: 1.5rem;
            font-weight: bold;
            height: 40px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 95%;
            max-width: 400px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <a id="btn-home" class="nav-link" href="index.html" onclick="playClick()">🏠</a>
        <button id="btn-back" class="nav-link hidden" style="background:none; border:none;"
            onclick="goBackToGrid()">↩️</button>
        <h2 id="page-title" class="page-title">練字小教室</h2>
        <div style="width: 30px;"></div>
    </div>
    <div id="selection-view">
        <div id="grid-container" class="grid-container"></div>
    </div>
    <div id="practice-view" class="hidden">
        <div id="canvas-container"><canvas id="bg-layer" width="300" height="300"></canvas><canvas id="draw-layer"
                width="300" height="300"></canvas></div>
        <div id="result-display"></div>
        <div class="controls"><button class="btn btn-gray" style="flex:0.6" onclick="changeLetter(-1)">◀</button><button
                class="btn btn-secondary" id="case-btn" onclick="toggleCase()">Aa</button><button class="btn btn-gray"
                style="flex:0.6" onclick="changeLetter(1)">▶</button></div>
        <div class="controls"><button class="btn btn-danger" style="flex:1" onclick="clearCanvas()">重寫</button><button
                class="btn btn-accent" style="flex:1.5; font-size:1.3rem" onclick="calculateScore()">💯 評分</button>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('type') || 'EN';
        let letters = [], currentIndex = 0, isUpper = true, isDrawing = false;
        const canvasSize = 300;
        const bgCanvas = document.getElementById('bg-layer'), bgCtx = bgCanvas.getContext('2d');
        const drawCanvas = document.getElementById('draw-layer'), drawCtx = drawCanvas.getContext('2d');
        const resultDisplay = document.getElementById('result-display');
        function init() {
            if (mode === 'ZH') { letters = GAME_DATA.WRITING.ZH; document.getElementById('page-title').innerText = "注音符號表"; document.getElementById('case-btn').classList.add('hidden'); document.getElementById('grid-container').className = "grid-container grid-zh"; }
            else { letters = GAME_DATA.WRITING.EN; document.getElementById('page-title').innerText = "English ABC"; document.getElementById('grid-container').className = "grid-container grid-en"; }
            renderGrid(); setupCanvas();
        }
        function renderGrid() {
            const container = document.getElementById('grid-container'); container.innerHTML = '';
            letters.forEach((char, index) => { const btn = document.createElement('div'); btn.className = 'char-card'; btn.innerText = char; btn.onclick = () => startPractice(index); container.appendChild(btn); });
        }
        function startPractice(index) { playClick(); currentIndex = index; isUpper = true; document.getElementById('selection-view').classList.add('hidden'); document.getElementById('practice-view').classList.remove('hidden'); document.getElementById('btn-home').classList.add('hidden'); document.getElementById('btn-back').classList.remove('hidden'); clearCanvas(); renderTemplate(); }
        function goBackToGrid() { playClick(); document.getElementById('practice-view').classList.add('hidden'); document.getElementById('selection-view').classList.remove('hidden'); document.getElementById('btn-back').classList.add('hidden'); document.getElementById('btn-home').classList.remove('hidden'); document.getElementById('page-title').innerText = (mode === 'ZH') ? "注音符號表" : "English ABC"; }
        function setupCanvas() {
            drawCtx.lineCap = 'round'; drawCtx.lineJoin = 'round'; drawCtx.lineWidth = 13; drawCtx.strokeStyle = '#333';
            const start = (e) => { e.preventDefault(); isDrawing = true; drawCtx.beginPath(); const p = getPos(e); drawCtx.moveTo(p.x, p.y); playClick(); };
            const move = (e) => { if (!isDrawing) return; e.preventDefault(); const p = getPos(e); drawCtx.lineTo(p.x, p.y); drawCtx.stroke(); };
            const end = () => isDrawing = false;
            drawCanvas.addEventListener('mousedown', start); drawCanvas.addEventListener('mousemove', move); drawCanvas.addEventListener('mouseup', end);
            drawCanvas.addEventListener('touchstart', start, { passive: false }); drawCanvas.addEventListener('touchmove', move, { passive: false }); drawCanvas.addEventListener('touchend', end);
        }
        function renderTemplate() {
            bgCtx.clearRect(0, 0, canvasSize, canvasSize); let char = letters[currentIndex]; if (mode === 'EN' && !isUpper) char = char.toLowerCase();
            document.getElementById('page-title').innerText = `練習: ${char}`;
            bgCtx.strokeStyle = '#e1f5fe'; bgCtx.lineWidth = 2; bgCtx.beginPath(); bgCtx.moveTo(0, canvasSize / 2); bgCtx.lineTo(canvasSize, canvasSize / 2); bgCtx.moveTo(canvasSize / 2, 0); bgCtx.lineTo(canvasSize / 2, canvasSize); bgCtx.stroke();
            bgCtx.font = "200px Arial"; if (mode === 'ZH') bgCtx.font = "180px Microsoft JhengHei"; bgCtx.textAlign = "center"; bgCtx.textBaseline = "middle"; bgCtx.fillStyle = "#cfd8dc"; bgCtx.fillText(char, canvasSize / 2, canvasSize / 2 + 15);
        }
        function getPos(e) { const rect = drawCanvas.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX, cy = e.touches ? e.touches[0].clientY : e.clientY; return { x: cx - rect.left, y: cy - rect.top }; }
        function calculateScore() {
            const bgData = bgCtx.getImageData(0, 0, canvasSize, canvasSize).data, drawData = drawCtx.getImageData(0, 0, canvasSize, canvasSize).data;
            let tp = 0, hp = 0, op = 0; for (let i = 0; i < bgData.length; i += 4) { const ht = bgData[i + 3] > 0, hd = drawData[i + 3] > 0; if (ht) { tp++; if (hd) hp++; } else { if (hd) op++; } }
            if (tp === 0) return; if (hp === 0) { resultDisplay.innerText = "請先寫字喔！"; resultDisplay.style.color = "#555"; return; }
            let s = Math.round((hp / tp) * 125 - (op / tp) * 10); if (s > 100) s = 100; if (s < 0) s = 0;
            if (s >= 90) { resultDisplay.innerText = "🌟 完美！獲得 10 星"; resultDisplay.style.color = "var(--accent)"; playSuccess(); LukeCore.Stats.addStars(10); }
            else if (s >= 70) { resultDisplay.innerText = "😊 很棒！獲得 5 星"; resultDisplay.style.color = "var(--secondary)"; playSuccess(); LukeCore.Stats.addStars(5); }
            else { resultDisplay.innerText = "🤔 加油！再試一次"; resultDisplay.style.color = "var(--danger)"; playClick(); }
        }
        function clearCanvas() { drawCtx.clearRect(0, 0, canvasSize, canvasSize); resultDisplay.innerText = ""; playClick(); }
        function changeLetter(dir) { currentIndex = (currentIndex + dir + letters.length) % letters.length; clearCanvas(); renderTemplate(); playClick(); }
        function toggleCase() { isUpper = !isUpper; clearCanvas(); renderTemplate(); playClick(); }
        init();
    </script>
</body>

</html>
