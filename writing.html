<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>練字大挑戰 - 每日任務</title>
    <link rel="stylesheet" href="styles.css">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script src="core.js"></script>
    <script src="data.js"></script>
    <style>
        body {
            background-color: var(--bg-green);
            padding-top: 10px;
        }

        .container {
            max-width: 950px;
            height: 95vh;
            display: flex;
            flex-direction: column;
        }

        #canvas-wrapper {
            flex: 1;
            background: #fff;
            border: 5px solid #a5d6a7;
            border-radius: 20px;
            position: relative;
            cursor: crosshair;
        }

        canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            border-radius: 15px;
        }

        .grading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .cloze-hint {
            font-size: 1.5rem;
            color: var(--text-light);
        }

        .cloze-target {
            font-size: 2.5rem;
            color: var(--accent);
            font-weight: bold;
        }

        .question-list {
            flex: 0 0 55% !important;
        }

        /* Wider for the grid */
    </style>
</head>

<body>

    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="nav-link" onclick="playClick()">🏠 主選單</a>
            <div id="exam-progress" style="font-weight: bold;">進度: 0/15</div>
            <div id="page-title" style="color: var(--accent); font-weight: bold;">每日練字</div>
        </div>

        <div class="math-layout">
            <!-- Left: Question List -->
            <div class="question-list" id="question-list">
                <div id="questions-grid" style="display:flex; flex-direction:column; gap:10px;"></div>
                <button id="btn-submit-exam" class="btn btn-accent" style="display:none; margin-top:15px"
                    onclick="submitExam()">📤 寫完囉！交卷評分</button>
            </div>

            <!-- Right: Canvas -->
            <div class="canvas-section">
                <div class="canvas-info" id="current-focus-text">請由左方選擇一個空格</div>
                <div id="hint-area" style="text-align:center; padding:10px;">
                    <span class="cloze-hint" id="cloze-prefix">練習寫</span>
                    <span class="cloze-target" id="cloze-char">?</span>
                </div>
                <div id="canvas-wrapper">
                    <canvas id="writeCanvas"></canvas>
                </div>
                <div class="btn-group" style="display: flex; gap: 10px;">
                    <button class="btn btn-gray" onclick="clearCanvas()">重寫</button>
                    <button class="btn btn-primary" id="btn-confirm" onclick="confirmAnswer()" disabled>確認填入 ✅</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Grading Modal -->
    <div id="grading-modal" class="grading-overlay">
        <h2>AI 正在努力閱卷中...</h2>
        <div id="grad-progress">0%</div>
        <div class="spinner" style="width:40px; height:40px; border-width:5px; border-top-color:var(--accent);"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const writingType = params.get('type') === 'ZH' ? 'ZH' : 'EN';
        const taskId = writingType === 'ZH' ? 'write-zh' : 'write-en';

        const TOTAL = 15;
        let sessionData = [];
        let currentIndex = -1;

        const canvas = document.getElementById('writeCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let worker = null;

        function init() {
            LukeCore.Timer.start();
            document.getElementById('page-title').innerText = writingType === 'ZH' ? "每日注音符號" : "每日英文練字";
            document.body.style.backgroundColor = writingType === 'ZH' ? "#fce4ec" : "var(--bg-green)";

            setupSession();
            renderList();
            resizeCanvas();
            setupCanvas();
            window.onresize = resizeCanvas;
        }

        function setupSession() {
            const fullList = GAME_DATA.WRITING[writingType];

            // Randomly pick 15 indices to be blanks
            const blankIndices = [];
            while (blankIndices.length < TOTAL) {
                const r = Math.floor(Math.random() * fullList.length);
                if (!blankIndices.includes(r)) blankIndices.push(r);
            }
            blankIndices.sort((a, b) => a - b);

            sessionData = fullList.map((char, i) => {
                const isBlank = blankIndices.includes(i);
                return {
                    target: char,
                    isBlank: isBlank,
                    imgData: null,
                    result: null,
                    displayIndex: i + 1
                };
            });
        }

        function renderList() {
            const grid = document.getElementById('questions-grid');
            grid.innerHTML = '';
            let filledCount = 0;
            const blanks = sessionData.filter(s => s.isBlank);

            // Create a more "flowy" display
            const container = document.createElement('div');
            container.style.display = 'flex';
            container.style.flexWrap = 'wrap';
            container.style.gap = '10px';
            container.style.justifyContent = 'center';
            container.style.padding = '10px';

            sessionData.forEach((item, i) => {
                if (item.isBlank && item.imgData) filledCount++;

                const el = document.createElement('div');
                if (item.isBlank) {
                    el.className = `math-item ${currentIndex === i ? 'active' : ''}`;
                    if (item.result) el.classList.add('graded', item.result);
                    el.style.width = '80px';
                    el.style.flexDirection = 'column';
                    el.style.padding = '5px';

                    el.innerHTML = `
                        <div class="slot-box" style="width:50px; height:50px; margin:0 auto">
                            ${item.imgData ? `<img src="${item.imgData}" class="slot-thumbnail">` : '?'}
                        </div>
                    `;
                    el.onclick = () => selectItem(i);
                } else {
                    el.style.width = '40px';
                    el.style.height = '60px';
                    el.style.display = 'flex';
                    el.style.alignItems = 'center';
                    el.style.justifyContent = 'center';
                    el.style.fontSize = '1.8rem';
                    el.style.color = '#ccc';
                    el.style.border = '2px solid transparent';
                    el.innerText = item.target;
                }
                container.appendChild(el);
            });
            grid.appendChild(container);

            document.getElementById('exam-progress').innerText = `進度: ${filledCount}/${TOTAL}`;
            document.getElementById('btn-submit-exam').style.display = (filledCount === TOTAL) ? 'block' : 'none';
        }

        function selectItem(idx) {
            currentIndex = idx;
            const item = sessionData[idx];

            // If it's a blank and we haven't graded yet, hide the answer
            if (item.isBlank && !item.result) {
                document.getElementById('cloze-char').innerText = "?";
                document.getElementById('cloze-prefix').innerText = "這格該填什麼呢？";
            } else {
                // Show answer if it's graded (for correction)
                document.getElementById('cloze-char').innerText = item.target;
                document.getElementById('cloze-prefix').innerText = "練習寫";
            }

            document.getElementById('current-focus-text').innerText = `正在練習：${item.isBlank ? '這格該填什麼？' : item.target}`;
            document.getElementById('btn-confirm').disabled = false;

            clearCanvas();
            renderList();
            playClick();
        }

        function confirmAnswer() {
            if (currentIndex === -1) return;
            sessionData[currentIndex].imgData = getCanvasWithWhiteBackground();
            playClick();

            if (currentIndex < sessionData.length - 1) {
                // Find the next blank item
                let nextBlankIndex = -1;
                for (let i = currentIndex + 1; i < sessionData.length; i++) {
                    if (sessionData[i].isBlank) {
                        nextBlankIndex = i;
                        break;
                    }
                }
                if (nextBlankIndex !== -1) {
                    selectItem(nextBlankIndex);
                } else {
                    renderList(); // All blanks filled, just re-render to update progress
                }
            } else {
                renderList();
            }
        }

        async function submitExam() {
            if (!confirm("確定要交卷評分嗎？")) return;

            document.getElementById('grading-modal').style.display = 'flex';

            if (!worker) {
                const lang = writingType === 'EN' ? 'eng' : 'chi_tra';
                worker = await Tesseract.createWorker(lang, 1, {
                    langPath: 'https://tessdata.projectnaptha.com/4.0.0'
                });
                if (writingType === 'EN') {
                    await worker.setParameters({
                        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
                        tessedit_pageseg_mode: '10' // Single character
                    });
                } else {
                    await worker.setParameters({
                        tessedit_pageseg_mode: '10' // Single character
                    });
                }
            }

            let correctCount = 0;
            const blanks = sessionData.filter(s => s.isBlank);
            for (let i = 0; i < blanks.length; i++) {
                const q = blanks[i];
                document.getElementById('grad-progress').innerText = `${Math.round((i / TOTAL) * 100)}%`;

                try {
                    const { data: { text } } = await worker.recognize(q.imgData);
                    const recognized = text.trim();
                    // Basic check: includes the target character?
                    if (recognized.toLowerCase().includes(q.target.toLowerCase())) {
                        q.result = 'correct';
                        correctCount++;
                    } else {
                        q.result = 'wrong';
                    }
                } catch (e) {
                    q.result = 'wrong';
                }
            }

            document.getElementById('grading-modal').style.display = 'none';
            const duration = LukeCore.Timer.stop();
            LukeCore.Daily.markComplete(taskId, duration);

            alert(`練字結束！\n答對題數：${correctCount} / ${TOTAL}\n用時：${Math.floor(duration / 60)}分${duration % 60}秒\n獲得星星：${correctCount * 1}`);
            LukeCore.Stats.addStars(correctCount * 1);

            renderList();

            const btn = document.getElementById('btn-submit-exam');
            btn.innerText = "修正錯誤內容";
            btn.className = "btn btn-secondary";
            btn.onclick = () => {
                const firstWrongIndex = sessionData.findIndex(s => s.isBlank && s.result === 'wrong');
                if (firstWrongIndex !== -1) {
                    selectItem(firstWrongIndex);
                } else {
                    alert("漂亮！全部都寫對囉！");
                    location.href = 'index.html';
                }
            };
        }

        // --- Canvas Logic ---
        function getCanvasWithWhiteBackground() {
            const w = canvas.width, h = canvas.height;
            // Add padding to help Tesseract
            const padding = 20;
            const t = document.createElement('canvas');
            t.width = w + padding * 2;
            t.height = h + padding * 2;
            const c = t.getContext('2d');

            // Fill white
            c.fillStyle = '#ffffff';
            c.fillRect(0, 0, t.width, t.height);

            // Draw original with padding
            c.drawImage(canvas, padding, padding);

            // Image Processing: Thresholding (High Contrast)
            const imgData = c.getImageData(0, 0, t.width, t.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const brightness = (data[i] + data[i + 1] + data[i + 2]) / 3;
                const v = brightness > 180 ? 255 : 0;
                data[i] = data[i + 1] = data[i + 2] = v;
            }
            c.putImageData(imgData, 0, 0);

            return t.toDataURL('image/png', 0.5);
        }
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width; canvas.height = rect.height;
            setupCtx();
        }
        function setupCtx() { ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#333'; }
        function setupCanvas() {
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                return { x, y };
            };
            const start = (e) => { e.preventDefault(); isDrawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
            const move = (e) => { if (!isDrawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            const stop = () => isDrawing = false;
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start, { passive: false });
            canvas.addEventListener('touchmove', move, { passive: false });
            canvas.addEventListener('touchend', stop);
        }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        init();
    </script>
</body>

</html>
